name: review-pilot

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install review-pilot
        run: python -m pip install -e .

      - name: Run review-pilot
        run: review-pilot github-action --event-path "$GITHUB_EVENT_PATH" --output-dir review-pilot-artifacts --post-summary-comment

      - name: Upload review artifact
        uses: actions/upload-artifact@v4
        with:
          name: review-pilot-report
          path: review-pilot-artifacts/
